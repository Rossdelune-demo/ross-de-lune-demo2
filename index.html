<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hola Firebase</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  body{font-family:Arial,sans-serif;max-width:500px;margin:40px auto;padding:20px;}
  button{padding:12px 20px;font-size:16px;cursor:pointer;margin-top:10px;}
  #resultado{margin-top:20px;padding:15px;border-radius:6px;font-family:monospace;white-space:pre-wrap;}
  .ok{background:#d4edda;color:#155724;}
  .error{background:#f8d7da;color:#721c24;}
  .esperando{background:#fff3cd;color:#856404;}
</style>
</head>
<body>
  <h2>🔥 Prueba de conexión Firebase</h2>
  <p>Este botón intenta leer un documento de Firestore. Si funciona, verás "OK". Si no, verás el error exacto.</p>

  <!-- ── REEMPLAZA con tu firebaseConfig real ── -->
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCJydzaGFuAf1flRw0SpywIXLFHkNkrSyo",
    authDomain: "rossdelune-demo.firebaseapp.com",
    projectId: "rossdelune-demo",
    storageBucket: "rossdelune-demo.firebasestorage.app",
    messagingSenderId: "779354791081",
    appId: "1:779354791081:web:4fe3b6fcb3dbcc42495db8",
    measurementId: "G-058056DKSK"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    db.settings({ experimentalForceLongPolling: true });
  </script>

  <button onclick="probarConexion()">🔌 Probar conexión a Firestore</button>
  <div id="resultado" class="esperando">Esperando prueba...</div>

  <script>
    async function probarConexion(){
      const div = document.getElementById("resultado");
      div.className = "esperando";
      div.textContent = "Conectando... (esperando hasta 10 segundos)";

      // Timeout manual de 10 segundos para no quedar colgado indefinidamente
      const timeout = new Promise((_, reject) =>
        setTimeout(() => reject(new Error("TIMEOUT: no hubo respuesta en 10 segundos")), 10000)
      );

      try{
        const snap = await Promise.race([
          db.collection("rossdelune").doc("data").get(),
          timeout
        ]);
        div.className = "ok";
        if(snap.exists){
          div.textContent = "✅ CONEXIÓN EXITOSA — el documento existe\n\nDatos:\n" + JSON.stringify(snap.data(), null, 2).slice(0, 500);
        } else {
          div.textContent = "✅ CONEXIÓN EXITOSA — pero el documento 'data' no existe todavía en esta colección.\n\n(Esto es normal si es un proyecto nuevo. La conexión a Firestore SÍ funciona.)";
        }
      }catch(e){
        div.className = "error";
        div.textContent = "❌ ERROR\n\nNombre: " + e.name + "\nCódigo: " + (e.code||"N/A") + "\nMensaje: " + e.message;
      }
    }
  </script>
</body>
</html>
